model_name: "dcr"
data_config:
  train_batch_size: 16
  num_workers: 4
  img_size: 224
  img_dir: dataset/CC3M/
  seed: 0
  patch_size: 1
clip_config:
  sd_model_name: "sd-2.1"
  clip_image_size: 224
  clip_type: "large"
  clip_dim: 1024
  t5_dim: 1280
lora_config:
  r: 16
  lora_alpha: 16
  lora_dropout: 0.1
  bias: "lora_only"
